<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetsu Sourdough - 職人酸種麵包預購</title>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f5f2; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 核心設定區 ---
        // 請替換為你最新的部署網址
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxoK-pS1_6Xp5u-L9k2vQoE_8G6G8G6G8G6/exec"; 

        // 圖片網址建議先用測試網址，確定不全白後再換回長網址，並確保引號正確
        const CAROUSEL_IMAGES = [
            'https://images.unsplash.com/photo-1585478259715-876a6a81fc08?auto=format&fit=crop&q=80&w=800',
            'https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&q=80&w=800'
        ];

        const PRODUCTS = [
            { id: 1, name: '經典原味酸種', price: 280, desc: '低溫發酵 24 小時，純粹麥香' },
            { id: 2, name: '核桃蔓越莓酸種', price: 320, desc: '豐富果乾與堅果，口感紮實' },
            { id: 3, name: '黑橄欖鹽之花', price: 300, desc: '鹹香適中，最適合搭配濃湯' }
        ];

        const App = () => {
            const [cart, setCart] = useState({});
            const [buyer, setBuyer] = useState({ name: '', phone: '', note: '' });
            const [loading, setLoading] = useState(false);
            const [imgIndex, setImgIndex] = useState(0);

            // 自動輪播
            useEffect(() => {
                const timer = setInterval(() => {
                    setImgIndex((prev) => (prev + 1) % CAROUSEL_IMAGES.length);
                }, 4000);
                return () => clearInterval(timer);
            }, []);

            const addToCart = (id) => {
                setCart(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
            };

            const removeFromCart = (id) => {
                if (!cart[id]) return;
                const newCart = { ...cart };
                if (newCart[id] === 1) delete newCart[id];
                else newCart[id] -= 1;
                setCart(newCart);
            };

            const totalAmount = Object.entries(cart).reduce((sum, [id, qty]) => {
                const product = PRODUCTS.find(p => p.id === parseInt(id));
                return sum + (product.price * qty);
            }, 0);

            const handleSubmit = async () => {
                if (!buyer.name || !buyer.phone || totalAmount === 0) {
                    alert('請填寫完整姓名、電話並選擇麵包');
                    return;
                }

                setLoading(true);
                
                const orderDetail = Object.entries(cart).map(([id, qty]) => {
                    const product = PRODUCTS.find(p => p.id === parseInt(id));
                    return `${product.name} x${qty}`;
                }).join(', ');

                const payload = {
                    name: buyer.name,
                    phone: buyer.phone,
                    note: buyer.note || "",
                    order: orderDetail,
                    total: totalAmount,
                    feedback: "" // 預留給 GAS 使用
                };

                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    alert('訂單已送出！請留意手機聯繫。');
                    setCart({});
                    setBuyer({ name: '', phone: '', note: '' });
                } catch (err) {
                    console.error(err);
                    alert('系統忙碌中，請稍後再試');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header & Hero */}
                    <div className="relative h-64 overflow-hidden">
                        <img 
                            src={CAROUSEL_IMAGES[imgIndex]} 
                            className="w-full h-full object-cover transition-opacity duration-1000"
                        />
                        <div className="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
                            <h1 className="text-white text-3xl font-bold tracking-widest">TESU 職人酸種</h1>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-4 -mt-10 relative z-10">
                        {/* 產品清單 */}
                        <div className="glass-card rounded-2xl p-6 shadow-xl mb-6">
                            <h2 className="text-xl font-bold mb-4 text-orange-900 border-b pb-2">今日出爐清單</h2>
                            {PRODUCTS.map(p => (
                                <div key={p.id} className="flex justify-between items-center mb-6">
                                    <div className="flex-1">
                                        <h3 className="font-bold text-gray-800">{p.name}</h3>
                                        <p className="text-xs text-gray-500">{p.desc}</p>
                                        <p className="text-orange-700 font-medium mt-1">${p.price}</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => removeFromCart(p.id)} className="w-8 h-8 rounded-full border border-orange-200 flex items-center justify-center">-</button>
                                        <span className="w-4 text-center font-bold">{cart[p.id] || 0}</span>
                                        <button onClick={() => addToCart(p.id)} className="w-8 h-8 rounded-full bg-orange-100 text-orange-800 flex items-center justify-center">+</button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* 客戶資訊 */}
                        <div className="glass-card rounded-2xl p-6 shadow-xl mb-6">
                            <h2 className="text-xl font-bold mb-4 text-orange-900 border-b pb-2">預約資訊</h2>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm text-gray-600 mb-1">取件人姓名 *</label>
                                    <input 
                                        type="text" 
                                        className="w-full p-2 border-b border-gray-300 focus:border-orange-500 outline-none transition-colors bg-transparent"
                                        value={buyer.name}
                                        onChange={e => setBuyer({...buyer, name: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-600 mb-1">手機號碼 *</label>
                                    <input 
                                        type="tel" 
                                        className="w-full p-2 border-b border-gray-300 focus:border-orange-500 outline-none transition-colors bg-transparent"
                                        value={buyer.phone}
                                        onChange={e => setBuyer({...buyer, phone: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-600 mb-1">備註 (特殊需求/過敏等)</label>
                                    <input 
                                        type="text" 
                                        className="w-full p-2 border-b border-gray-300 focus:border-orange-500 outline-none transition-colors bg-transparent"
                                        value={buyer.note}
                                        onChange={e => setBuyer({...buyer, note: e.target.value})}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* 結帳按鈕 */}
                        <button 
                            onClick={handleSubmit}
                            disabled={loading}
                            className={`w-full py-4 rounded-full text-white text-lg font-bold shadow-lg transition-transform active:scale-95 ${loading ? 'bg-gray-400' : 'bg-orange-800'}`}
                        >
                            {loading ? '訂單處理中...' : `送出預訂 (共 $${totalAmount})`}
                        </button>
                    </div>
                    
                    <footer className="mt-12 text-center text-gray-400 text-sm px-4">
                        <p>純手工製作，下單後請保持電話暢通</p>
                        <p className="mt-1">Tetsu Artisan Sourdough Lab</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

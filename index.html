    function BakeryLandingPage() {
      const [cart, setCart] = useState([]);
      const [buyerInfo, setBuyerInfo] = useState({ name: '', phone: '', note: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [orderSuccess, setOrderSuccess] = useState(false);

      const [toastMsg, setToastMsg] = useState('');
      const cartSectionRef = useRef(null);

      const [currentSlide, setCurrentSlide] = useState(0);

      const [customBase, setCustomBase] = useState(CUSTOM_BASES[0]);
      const [customSelectedFillings, setCustomSelectedFillings] = useState([]);
      const [customQuantity, setCustomQuantity] = useState(1);

      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

      const showToast = (itemName) => {
        setToastMsg(`已將「${itemName}」加入購物車！`);
        setTimeout(() => {
          setToastMsg('');
        }, 2500);
      };

      const nextSlide = useCallback(() => {
        setCurrentSlide((prev) => (prev === CAROUSEL_IMAGES.length - 1 ? 0 : prev + 1));
      }, []);

      const prevSlide = () => {
        setCurrentSlide((prev) => (prev === 0 ? CAROUSEL_IMAGES.length - 1 : prev - 1));
      };

      useEffect(() => {
        const timer = setInterval(() => {
          nextSlide();
        }, 4000); 
        return () => clearInterval(timer);
      }, [nextSlide]);

      const currentCustomPrice = useMemo(() => {
        const basePrice = 250;
        const premiumCount = customSelectedFillings.filter(f => f.premium).length;
        const totalCount = customSelectedFillings.length;
        const extraCountCharge = Math.max(0, totalCount - 2) * 30;
        const premiumCharge = premiumCount * 30;
        return basePrice + extraCountCharge + premiumCharge;
      }, [customSelectedFillings]);

      const handleFillingToggle = (filling) => {
        setCustomSelectedFillings(prev => {
          const exists = prev.find(f => f.name === filling.name);
          if (exists) {
            return prev.filter(f => f.name !== filling.name);
          } else {
            return [...prev, filling];
          }
        });
      };

      const addClassicToCart = (bread) => {
        setCart(prev => {
          const existing = prev.find(item => item.id === bread.id);
          if (existing) {
            return prev.map(item => item.id === bread.id ? { ...item, quantity: item.quantity + 1 } : item);
          }
          return [...prev, { ...bread, type: 'classic', price: 250, quantity: 1 }];
        });
        showToast(bread.name);
      };

      const addCustomToCart = () => {
        if (customSelectedFillings.length === 0) {
          alert("請至少選擇一樣配料唷！");
          return;
        }
        const cartItem = {
          id: `custom-${Date.now()}`,
          type: 'custom',
          name: `客製化: ${customBase}麵糰`,
          desc: `配料: ${customSelectedFillings.map(f => f.name).join('、')}`,
          price: currentCustomPrice,
          quantity: customQuantity
        };
        
        setCart(prev => [...prev, cartItem]);
        setCustomBase(CUSTOM_BASES[0]);
        setCustomSelectedFillings([]);
        setCustomQuantity(1);
        showToast(`客製款: ${customBase}麵糰`);
      };

      const updateCartQuantity = (id, delta) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const minQty = 1;
            const newQty = Math.max(minQty, item.quantity + delta);
            return { ...item, quantity: newQty };
          }
          return item;
        }));
      };

      const removeFromCart = (id) => {
        setCart(prev => prev.filter(item => item.id !== id));
      };

      const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (cart.length === 0) {
          alert("購物車是空的唷，趕快挑選喜歡的麵包吧！");
          return;
        }
        if (!buyerInfo.name || !buyerInfo.phone) {
          alert("請填寫完整的姓名與手機號碼！");
          return;
        }
        
        setIsSubmitting(true);

        const orderDetails = cart.map(item => {
          if (item.type === 'custom') {
            return `[客製化] ${item.name}\n  └ ${item.desc}\n  └ 數量: ${item.quantity} (單價$${item.price})`;
          }
          return `[經典] ${item.name} x${item.quantity}`;
        }).join('\n\n');

        // ⚠️ 這裡已幫你將 payload 對齊 GAS 版本，加入了 feedback 與 note || ""
        const payload = {
          name: buyerInfo.name,
          phone: buyerInfo.phone,
          note: buyerInfo.note || "",
          order: orderDetails,
          total: cartTotal,
          feedback: "" 
        };

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWHNKHiuJVL7-_shbfdq9u7hWbkL3b3q5XgJ3GJnWAL66WBZksHwBU4vflGAGh9j36YA/exec'; 

        try {
          if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
            console.log("尚未設定真實 API，模擬送出以下訂單資料：", payload);
            await new Promise(resolve => setTimeout(resolve, 1500));
          } else {
            await fetch(SCRIPT_URL, {
              method: 'POST',
              mode: 'no-cors', 
              headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
              body: JSON.stringify(payload)
            });
          }
          
          setOrderSuccess(true);
          setCart([]);
        } catch (error) {
          console.error('訂單送出失敗:', error);
          alert('哎呀！訂單送出失敗了，請檢查您的 Apps Script 網址是否正確，或稍後再試。');
        } finally {
          setIsSubmitting(false);
        }
      };

      if (orderSuccess) {

              <div className="absolute -right-10 -bottom-10 opacity-20 text-amber-100 pointer-events-none z-0">

                  聽聽這酥脆的表皮聲，看看這充滿韌性的老麵組織！這就是經過長時間低溫發酵，才能孕育出的極致口感。

    }

    // 初始化並渲染 React 應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BakeryLandingPage />);
  </script>
